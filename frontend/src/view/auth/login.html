<section class="auth-page">
    <div class="auth-card">
        <p class="eyebrow">Cuenta</p>
        <h1>Iniciar sesion</h1>
        <p class="text-muted">Ingresa con el usuario administrador o con una cuenta normal.</p>
        <form id="login-page-form">
            <div class="mb-3">
                <label class="form-label" for="login-email">Correo</label>
                <input class="form-control" id="login-email" type="email" value="admin@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="login-password">Password</label>
                <input class="form-control" id="login-password" type="password" value="admin" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Ingresar</button>
        </form>
        <div class="auth-switch">
            <span>No tienes cuenta?</span>
            <a href="#/registro">Crear cuenta</a>
        </div>
    </div>
</section>

spring.application.name=tecnostore

server.port=8080
server.servlet.context-path=/api

# MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/tecnostore_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL INIT
spring.sql.init.mode=never

# UPLOADS
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.product-image-dir=../frontend/assets/img

# LOGS
debug=false
logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.web=INFO
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
logging.level.com.tecnostore=DEBUG
